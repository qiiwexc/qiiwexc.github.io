version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      github-actions-patch-updates:
        update-types:
          - "patch"
          - "minor"
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/build"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      github-actions-patch-updates:
        update-types:
          - "patch"
          - "minor"
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/deploy"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      github-actions-patch-updates:
        update-types:
          - "patch"
          - "minor"
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/release"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      github-actions-patch-updates:
        update-types:
          - "patch"
          - "minor"
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/test"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      github-actions-patch-updates:
        update-types:
          - "patch"
          - "minor"
