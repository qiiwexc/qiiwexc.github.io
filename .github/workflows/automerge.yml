name: Dependabot auto-merge

permissions: {}

on:
  pull_request:
    types: [ opened, reopened, synchronize ]

jobs:
  automerge:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
      contents: write
    steps:
      # 'gh pr merge --auto' alone would merge immediately if no branch protection
      # rules require status checks — explicitly wait for all checks to pass
      # before merging so nothing lands without a green CI run
      - name: Wait for CI checks to pass
        run: |
          sleep 60
          gh pr checks "$PR_URL" --watch --fail-fast
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}

      - name: Merge
        run: gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}
