name: Tag

permissions: {}

on:
  workflow_dispatch:

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      # 'actions: write' is required by the explicit CI trigger below — tags pushed
      # with GITHUB_TOKEN do not fire 'on: push' workflows (recursion protection),
      # so CI must be dispatched manually for the new tag
      actions: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Create and push tag
        id: create-tag
        run: |
          version=$(date +'%-y.%-m.%-d')
          tag="v$version"

          if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "::error::Tag $tag already exists"
              exit 1
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

          echo "tag=$tag" >> $GITHUB_OUTPUT

      # The tag push above uses GITHUB_TOKEN, which never triggers other workflows —
      # without this explicit dispatch the release CI run would not start
      - name: Trigger CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --repo "${{ github.repository }}" --ref "${{
          steps.create-tag.outputs.tag }}"
