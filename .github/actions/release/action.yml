name: Create Release
description: Create a GitHub release with build artifacts

inputs:
  tag:
    description: The tag name to release
    required: true

runs:
  using: composite
  steps:
    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-output
        path: artifacts

    - name: Generate checksums
      shell: bash
      working-directory: artifacts/build
      run: sha256sum qiiwexc.bat qiiwexc.ps1 autounattend-*.xml > SHA256SUMS.txt

    - name: Create release
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        tag_name: ${{ inputs.tag }}
        name: ${{ inputs.tag }}
        generate_release_notes: true
        body: 'SHA-256 checksums for the release assets are attached as `SHA256SUMS.txt`.'
        files: |
          artifacts/build/qiiwexc.bat
          artifacts/build/qiiwexc.ps1
          artifacts/build/autounattend-*.xml
          artifacts/build/SHA256SUMS.txt
