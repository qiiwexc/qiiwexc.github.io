name: Create Release
description: Create a GitHub release with build artifacts

inputs:
  tag:
    description: The tag name to release
    required: true

runs:
  using: composite
  steps:
    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-output
        path: artifacts

    - name: Create release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        tag_name: ${{ inputs.tag }}
        name: ${{ inputs.tag }}
        generate_release_notes: true
        files: |
          artifacts/build/qiiwexc.bat
          artifacts/build/qiiwexc.ps1
          artifacts/build/autounattend-*.xml
