name: Build
description: Build the project and upload artifacts for tagged commits

runs:
  using: composite
  steps:
    - name: Read PSScriptAnalyzer version
      id: versions
      shell: powershell
      run: |
        $deps = Get-Content 'resources/dependencies.json' | ConvertFrom-Json
        $version = ($deps | Where-Object { $_.name -eq 'PSScriptAnalyzer' }).version
        "psscriptanalyzer=$version" >> $env:GITHUB_OUTPUT

    - name: Cache PSScriptAnalyzer
      id: cache-psmodules
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/Documents/WindowsPowerShell/Modules
        key: psmodules-PSScriptAnalyzer-${{ steps.versions.outputs.psscriptanalyzer }}

    - name: Install PSScriptAnalyzer
      if: steps.cache-psmodules.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        Set-PSRepository PSGallery -InstallationPolicy Trusted
        Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -RequiredVersion ${{ steps.versions.outputs.psscriptanalyzer }}

    - name: Run build
      shell: powershell
      run: .\build-ci.bat

    - name: Upload build artifacts
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: build-output
        path: |
          public
          d/version
          d/*.css
          build/index.html
          build/qiiwexc.bat
          build/qiiwexc.ps1
          build/autounattend-*.xml
